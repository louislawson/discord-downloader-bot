services:
  bot:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
      tags:
        - downloader-bot-dev:latest
    volumes:
      # Adds current directory as volume.
      - .:/bot/
    env_file:
      - .env
    depends_on:
      azurite:
        condition: service_started
      azurite_init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
      tags:
        - downloader-bot-dev:latest
    volumes:
      - .:/bot/
    env_file:
      - .env
    # Override the dev image's bot CMD with the arq worker entrypoint, wrapped in
    # watchfiles so worker code changes hot-reload the same way bot.py does.
    # Single watch path = the package directory; new files are picked up
    # automatically.
    command:
      - watchfiles
      - --filter
      - python
      - arq downloader_bot.worker.main.WorkerSettings
      - /bot/downloader_bot
    depends_on:
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
      azurite_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      retries: 30

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    hostname: postgres
    restart: always
    environment:
      POSTGRES_USER: downloader
      POSTGRES_PASSWORD: downloader
      POSTGRES_DB: downloader
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U downloader -d downloader"]
      interval: 1s
      retries: 30

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: "azurite"
    hostname: azurite
    restart: always
    # skipApiVersionCheck - https://github.com/Azure/Azurite/discussions/2627
    command: "azurite --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck"
    ports:
      - "10000:10000"
      # required, see https://github.com/Azure/Azurite/issues/1666
    healthcheck:
      test: nc 127.0.0.1 10000 -z
      interval: 1s
      retries: 30

  # https://github.com/Azure/Azurite/issues/1665#issuecomment-1236796659
  azurite_init:
    image: mcr.microsoft.com/azure-cli:latest
    command:
      - /bin/sh
      - -c
      - |
        az storage container create --name media
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      # https://github.com/Azure/Azurite/blob/main/README.md#usage-with-azure-storage-sdks-or-tools
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;

volumes:
  redis-data:
  postgres-data:
